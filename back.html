<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in browser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #666666;
            margin-bottom: 40px;
            line-height: 1.4;
            max-width: 280px;
        }
        
        /* Animación de la flecha apuntando hacia arriba */
        .arrow-container {
            margin-bottom: 40px;
            height: 80px; /* Espacio fijo para el rebote */
        }
        .arrow {
            width: 60px;
            height: 60px;
            fill: none;
            stroke: #000000;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            /* Llama a la animación "bounce" */
            animation: bounce 1.2s infinite; 
        }
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-25px);
            }
        }

        .button-container {
            width: 100%;
            max-width: 350px;
            padding-bottom: 20px;
        }
        button {
            background-color: #007AFF; /* Azul característico de botones de acción */
            color: #ffffff;
            border: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px; /* Bordes redondeados */
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Open in browser</h1>
        <p>For the best experience, this page needs to open in your browser.</p>
        
        <!-- Flecha con animación -->
        <div class="arrow-container">
            <svg class="arrow" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
        </div>
    </div>

    <!-- Botón de acción manual -->
    <div class="button-container">
        <button id="openBtn">OPEN</button>
    </div>

    <script>
        // 1. Reemplaza esta URL con la tuya (la landing page de ofertas CPA / Amazon Jobs)
        const targetBaseUrl = "https://TU-LANDING-PAGE-DESTINO.com";
        
        // 2. Captura los parámetros de TikTok (?ttclid=...) para no perder track del tráfico
        const queryParams = window.location.search;
        const targetUrl = targetBaseUrl + queryParams;

        // 3. Lógica del botón (Solo actúa cuando el usuario presiona)
        document.getElementById('openBtn').addEventListener('click', function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const urlWithoutProtocol = targetUrl.replace(/^https?:\/\//, '');

            if (/android/i.test(userAgent)) {
                // Romper el navegador en Android forzando Chrome
                const intentUrl = "intent://" + urlWithoutProtocol + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.href = intentUrl;
                
            } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                // Romper el navegador en iOS forzando Chrome o Safari
                window.location.href = "googlechrome://" + urlWithoutProtocol;
                
                // Si Chrome no está instalado, abre el enlace normal tras una breve pausa
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 800);
                
            } else {
                // Usuarios en PC o navegadores nativos
                window.location.href = targetUrl;
            }
        });
    </script>

</body>
</html>
